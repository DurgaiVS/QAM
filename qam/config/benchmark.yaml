defaults:
    - symbols
    - checkpoint: base
    - _self_
    - override hydra/job_logging: stdout

experiment:
  output_dir: ???
  callbacks:
    - _target_: pytorch_lightning.callbacks.ModelSummary
      max_depth: 2

trainer:
  devices: -1
  accelerator: gpu
  strategy: ddp
  default_root_dir: ${experiment.base_dir}
  precision: 32

data:
  symbols: ${symbols}
  num_workers: 16
  batch_size: 32
  buffer_factor: 4
