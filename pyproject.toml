[tool.poetry]
name = "qam"
version = "0.1.0"
description = "An Reinforcement learning package to build trading bot"
authors = ["durgaivelselvan.m <durgaivel0309@gmail.com>"]
readme = "README.md"

[tool.poetry.scripts]
qam = "qam.main:app"

[tool.poetry.dependencies]
python = "~3.11.0"
pylint = ">=3.0"
pre-commit = ">=3.0"
black = ">=24.0"
isort = ">5.0"
clang-format = ">=18.0"
filterpy = ">=1.4"
hydra-core = ">=1.3"
torchmetrics = ">=1.2.0"
tensorboard = ">=2.10"
pytorch-lightning = "2.2.1"
typer = {extras = ["all"], version = "*"}
torch = "*"
torchaudio = {url = "https://download.pytorch.org/whl/cu121/torchaudio-2.3.1%2Bcu121-cp311-cp311-linux_x86_64.whl#sha256=2d9136bf3c9b6ab96dc42f26f6cb836d45d115f5766e16aff52835c8e7cde565"}
torchrl = "0.3.1"
yfinance = "0.2.37"

[tool.poetry.dev-dependencies]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
