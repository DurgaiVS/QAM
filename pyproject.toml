[tool.poetry]
name = "qam"
version = "0.1.0"
description = "A Reinforcement learning package to build and deploy trading bot"
authors = ["durgaivelselvan.m <durgaivel0309@gmail.com>"]
readme = "README.md"

[tool.poetry.scripts]
qam = "qam.main:app"

[tool.poetry.dependencies]
python = "~3.12.0"
filterpy = ">=1.4"
hydra-core = ">=1.3"
requests = "~2"
torchmetrics = ">=1.2.0"
tensorboard = ">=2.10"
pytorch-lightning = "~2.3"
typer = {extras = ["all"], version = "*"}
torch = {url = "https://download.pytorch.org/whl/cu121/torch-2.5.0%2Bcu121-cp312-cp312-linux_x86_64.whl"}
torchaudio = "*"
infinibatch = "*"
torchrl = "*"
yfinance = "0.2.37"

[tool.poetry.dev-dependencies]
pylint = ">=3.0"
pre-commit = ">=3.0"
black = ">=24.0"
isort = ">5.0"
clang-format = ">=18.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
